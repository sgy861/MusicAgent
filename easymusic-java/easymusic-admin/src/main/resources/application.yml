server:
  port: 8091
  servlet:
    context-path: /api
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/easymusic?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    listener:
      simple:
        auto-startup: false
    publisher-confirm-type: correlated
    publisher-returns: true
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#项目目录
project:
  folder: c:/webser/web_app/easymusic/
  #日志级别配置
log:
  root:
  level: debug
#管理员账号
admin:
  account: admin
  password: admin123

# Kimi (Moonshot AI) & Milvus Config
kimi:
  api:
    key: ${KIMI_API_KEY:sk-placeholder-replace-me}
    url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
milvus:
  host: localhost
  port: 19530